name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      INNGEST_EVENT_KEY: ci-inngest-event-key
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: npm ci

      - run: npm run secrets:scan

      - run: npm run env:doctor

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build

      - name: Check component version bumps
        if: github.event_name == 'pull_request'
        run: npm run versions:check -- --base origin/${{ github.base_ref }} --head HEAD

      - run: npm run versions:sync -- --dry-run

      - run: npm run redis:health

      - run: python -m pip install -r workers/tree-indexer-python/requirements.txt pytest

      - run: npm run test:tree-indexer

      - run: supabase start

      - run: npm run test:db

      - if: always()
        run: supabase stop --no-backup || true
